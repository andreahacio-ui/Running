<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marathon">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-512.png">
<title>Toronto Marathon 2026</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #E8FF47;
    --accent-dim: rgba(232,255,71,0.12);
    --blue: #4A9EFF;
    --blue-dim: rgba(74,158,255,0.12);
    --orange: #FF7A3D;
    --orange-dim: rgba(255,122,61,0.12);
    --green: #4ADE80;
    --green-dim: rgba(74,222,128,0.1);
    --purple: #C084FC;
    --purple-dim: rgba(192,132,252,0.12);
    --gray-dim: rgba(255,255,255,0.06);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

  /* Header */
  .header { padding: 16px 20px 10px; flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .header-title { font-size: 13px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  .header-race { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .header-date { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .countdown-pill { background: var(--accent); color: #0f0f0f; font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 20px; white-space: nowrap; }

  /* KM / MI toggle */
  .unit-toggle { display: flex; background: var(--bg3); border-radius: 20px; padding: 3px; border: 1px solid var(--border); }
  .unit-btn { padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.18s; letter-spacing: 0.04em; }
  .unit-btn.active { background: var(--text); color: var(--bg); }

  /* Progress bar */
  .progress-section { padding: 0 20px 12px; flex-shrink: 0; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 20px 12px; flex-shrink: 0; }
  .stat-card { background: var(--bg2); border-radius: 12px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 10px; color: var(--muted); }

  /* Phase nav */
  .phase-nav { display: flex; gap: 6px; padding: 0 20px 10px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .phase-nav::-webkit-scrollbar { display: none; }
  .phase-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--muted); white-space: nowrap; cursor: pointer; transition: all 0.15s; }
  .phase-btn.active { background: var(--accent); color: #0f0f0f; border-color: transparent; }

  /* Week list */
  .week-list { flex: 1; overflow-y: auto; padding: 0 20px; padding-bottom: calc(20px + var(--safe-bottom)); scrollbar-width: none; }
  .week-list::-webkit-scrollbar { display: none; }

  .week-card { background: var(--bg2); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; border: 1px solid var(--border); }
  .week-card.current-week { border-color: var(--accent); }
  .week-card.completed-week { opacity: 0.6; }

  .week-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
  .week-num-badge { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .badge-base { background: var(--gray-dim); color: var(--muted); }
  .badge-build { background: var(--blue-dim); color: var(--blue); }
  .badge-peak { background: var(--orange-dim); color: var(--orange); }
  .badge-taper { background: var(--green-dim); color: var(--green); }
  .badge-recovery { background: var(--gray-dim); color: var(--muted); }

  .week-info { flex: 1; min-width: 0; }
  .week-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .week-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .week-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .week-km { font-size: 14px; font-weight: 700; color: var(--text); }
  .week-check-count { font-size: 10px; color: var(--muted); }
  .week-chevron { font-size: 16px; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
  .week-chevron.open { transform: rotate(180deg); }

  /* Days grid */
  .week-days { display: none; padding: 0 14px 12px; }
  .week-days.open { display: block; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day-cell { border-radius: 10px; padding: 7px 4px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; }
  .day-cell.clickable:active { transform: scale(0.94); }
  .day-name-label { font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .day-icon { font-size: 18px; margin-bottom: 3px; display: block; }
  .day-type-label { font-size: 9px; font-weight: 600; line-height: 1.2; }
  .day-dist { font-size: 9px; color: var(--muted); margin-top: 1px; }

  .day-rest { background: var(--gray-dim); }
  .day-rest .day-type-label { color: var(--muted); }
  .day-run { background: var(--blue-dim); }
  .day-run .day-type-label { color: var(--blue); }
  .day-long { background: var(--orange-dim); }
  .day-long .day-type-label { color: var(--orange); }
  .day-strength { background: var(--green-dim); }
  .day-strength .day-type-label { color: var(--green); }
  .day-race { background: rgba(232,255,71,0.1); }
  .day-race .day-type-label { color: var(--accent); }
  .day-vibes { background: var(--purple-dim); }
  .day-vibes .day-type-label { color: var(--purple); }
  .day-vibes .day-dist { color: var(--purple); opacity: 0.7; }

  .day-cell.done::after {
    content: '✓';
    position: absolute;
    top: 3px; right: 4px;
    font-size: 9px;
    font-weight: 800;
    color: var(--green);
  }
  .day-cell.done .day-icon { opacity: 0.4; }

  .week-note { margin-top: 10px; font-size: 11px; color: var(--muted); line-height: 1.5; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 10px; }

  /* Detail overlay */
  .overlay { display: none; position: fixed; inset: 0; z-index: 100; }
  .overlay.open { display: flex; align-items: flex-end; }
  .overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.7); }
  .overlay-sheet { position: relative; z-index: 1; background: var(--bg2); border-radius: 24px 24px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom)); width: 100%; max-height: 85vh; overflow-y: auto; }
  .overlay-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .overlay-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .overlay-sub { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .overlay-detail { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
  .overlay-actions { display: flex; gap: 10px; }
  .btn-done { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; background: var(--green); color: #0f0f0f; }
  .btn-undone { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; border: 1px solid var(--border); cursor: pointer; background: transparent; color: var(--muted); }
  .btn-skip { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; background: var(--orange-dim); color: var(--orange); }

  /* Vibes quote card in overlay */
  .vibes-quote { background: var(--purple-dim); border: 1px solid rgba(192,132,252,0.2); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .vibes-quote-text { font-size: 15px; color: var(--purple); line-height: 1.5; font-style: italic; margin-bottom: 6px; }
  .vibes-quote-attr { font-size: 11px; color: var(--muted); }
  .vibes-label { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--purple); font-weight: 600; background: var(--purple-dim); padding: 3px 8px; border-radius: 6px; margin-bottom: 10px; }

  .empty-msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Training plan</div>
        <div class="header-race">Toronto Waterfront</div>
        <div class="header-date" id="header-date">Oct 18, 2026 · 42.2 km</div>
      </div>
      <div class="header-right">
        <div class="countdown-pill" id="countdown">—</div>
        <div class="unit-toggle">
          <button class="unit-btn active" id="btn-km" onclick="setUnit('km')">KM</button>
          <button class="unit-btn" id="btn-mi" onclick="setUnit('mi')">MI</button>
        </div>
      </div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-meta">
      <span id="prog-label">0 of 0 sessions done</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Week</div>
      <div class="stat-val" id="stat-week">—</div>
      <div class="stat-sub">of 18</div>

    <div class="stat-card">
      <div class="stat-label">This week</div>
      <div class="stat-val" id="stat-thisweek">—</div>
      <div class="stat-sub" id="stat-thisweek-sub">planned</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Long run</div>
      <div class="stat-val" id="stat-long">—</div>
      <div class="stat-sub" id="stat-long-sub">Saturday</div>
    </div>
  </div>

  <div class="phase-nav">
    <button class="phase-btn active" onclick="setFilter('all', this)">All</button>
    <button class="phase-btn" onclick="setFilter('base', this)">Base</button>
    <button class="phase-btn" onclick="setFilter('build', this)">Build</button>
    <button class="phase-btn" onclick="setFilter('peak', this)">Peak</button>
    <button class="phase-btn" onclick="setFilter('taper', this)">Taper</button>
  </div>

  <div class="week-list" id="weekList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-bg" onclick="closeOverlay()"></div>
  <div class="overlay-sheet">
    <div class="overlay-handle"></div>
    <div class="overlay-title" id="ov-title"></div>
    <div class="overlay-sub" id="ov-sub"></div>
    <div id="ov-vibes"></div>
    <div class="overlay-detail" id="ov-detail"></div>
    <div class="overlay-actions" id="ov-actions"></div>
  </div>
</div>

<script>
const RACE_DATE = new Date('2026-10-18T06:30:00');
const START_DATE = new Date('2026-06-15');
const KM_TO_MI = 0.621371;

let unit = 'km'; // 'km' or 'mi'

function fmt(km) {
  if (unit === 'mi') return (km * KM_TO_MI).toFixed(1);
  return km;
}
function unitLabel() { return unit === 'mi' ? 'mi' : 'km'; }

function setUnit(u) {
  unit = u;
  localStorage.setItem('marathon_unit', u);
  document.getElementById('btn-km').classList.toggle('active', u === 'km');
  document.getElementById('btn-mi').classList.toggle('active', u === 'mi');
  document.getElementById('header-date').textContent = 'Oct 18, 2026 · ' + (u === 'mi' ? '26.2 mi' : '42.2 km');

}

const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const PHASE_BADGE = { base:'badge-base', build:'badge-build', peak:'badge-peak', taper:'badge-taper', recovery:'badge-recovery' };

let state = {};
let currentFilter = 'all';
let openWeeks = new Set();
let overlayTarget = null;

function loadState() {
  try { state = JSON.parse(localStorage.getItem('marathon_state') || '{}'); } catch(e) { state = {}; }
  unit = localStorage.getItem('marathon_unit') || 'km';
}
function saveState() { localStorage.setItem('marathon_state', JSON.stringify(state)); }
function stateKey(weekN, dayIdx) { return 'w' + weekN + '_d' + dayIdx; }
function isDone(weekN, dayIdx) { return state[stateKey(weekN, dayIdx)] === 'done'; }
function isSkipped(weekN, dayIdx) { return state[stateKey(weekN, dayIdx)] === 'skip'; }
function setDayState(weekN, dayIdx, val) {
  if (val === null) delete state[stateKey(weekN, dayIdx)];
  else state[stateKey(weekN, dayIdx)] = val;
  saveState();
}

function currentWeekNum() {
  const now = new Date();
  const diff = now - START_DATE;
  const week = Math.floor(diff / (7 * 24 * 3600 * 1000)) + 1;
  return Math.max(1, Math.min(18, week));
}

function countStats() {
  let total = 0, done = 0;
  weeks.forEach(w => {
    w.days.forEach((d, i) => {
      if (d.type !== 'rest') { total++; if (isDone(w.n, i)) done++; }
    });
  });
  return { total, done };
}

function weekDoneCount(w) {
  let total = 0, done = 0;
  w.days.forEach((d, i) => {
    if (d.type !== 'rest') { total++; if (isDone(w.n, i)) done++; }
  });
  return { total, done };
}

function updateCountdown() {
  const now = new Date();
  const diff = RACE_DATE - now;
  if (diff <= 0) { document.getElementById('countdown').textContent = 'Race day!'; return; }
  const days = Math.ceil(diff / (1000 * 3600 * 24));
  document.getElementById('countdown').textContent = days + ' days';
}

function updateStats() {
  const { total, done } = countStats();
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-label').textContent = done + ' of ' + total + ' sessions done';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';

  const cw = currentWeekNum();
  document.getElementById('stat-week').textContent = cw;
  const curWeek = weeks.find(w => w.n === cw);
  if (curWeek) {
    const totalDist = curWeek.n === 18 ? 42 : curWeek.total;
    document.getElementById('stat-thisweek').textContent = fmt(totalDist);
    const longDist = curWeek.n === 18 ? 42 : curWeek.long;
    document.getElementById('stat-long').textContent = fmt(longDist);
    document.getElementById('stat-long-sub').textContent = unitLabel() + ' Saturday';
    const dc = weekDoneCount(curWeek);
    document.getElementById('stat-thisweek-sub').textContent = dc.done + '/' + dc.total + ' done · ' + unitLabel();
  }
}

function renderWeeks() {
  const cw = currentWeekNum();
  const list = document.getElementById('weekList');
  const filtered = currentFilter === 'all' ? weeks : weeks.filter(w => {
    if (currentFilter === 'base') return w.phase === 'base' || (w.phase === 'recovery' && w.n <= 5);
    if (currentFilter === 'build') return w.phase === 'build' || (w.phase === 'recovery' && w.n > 5 && w.n <= 12);
    return w.phase === currentFilter;
  });

  if (!filtered.length) { list.innerHTML = '<div class="empty-msg">No weeks in this phase.</div>'; return; }

  list.innerHTML = filtered.map(w => {
    const dc = weekDoneCount(w);
    const isCurrent = w.n === cw;
    const isComplete = dc.done === dc.total && dc.total > 0;
    const badgeCls = PHASE_BADGE[w.phase] || 'badge-base';
    const isOpen = openWeeks.has(w.n);
    const totalDist = w.n === 18 ? 42 : w.total;

    const daysHtml = w.days.map((d, i) => {
      const dd = DAY_DETAILS[d.type] || DAY_DETAILS.rest;
      const done = isDone(w.n, i);
      const clickable = d.type !== 'rest' ? 'clickable' : '';
      const doneClass = done ? 'done' : '';
      const icon = DAY_ICONS[d.type] || '😴';
      const distVal = d.km ? fmt(d.km) + ' ' + unitLabel() : '';
      const kmLabel = distVal ? '<div class="day-dist">' + distVal + '</div>' : '';
      return '<div class="day-cell ' + dd.cls + ' ' + clickable + ' ' + doneClass + '" onclick="onDayTap(' + w.n + ',' + i + ')">' +
        '<div class="day-name-label">' + DAY_NAMES[i] + '</div>' +
        '<span class="day-icon">' + icon + '</span>' +
        '<div class="day-type-label">' + dd.label + '</div>' +
        kmLabel +
        '</div>';
    }).join('');

    return '<div class="week-card' + (isCurrent ? ' current-week' : '') + (isComplete ? ' completed-week' : '') + '" id="wcard-' + w.n + '">' +
      '<div class="week-header" onclick="toggleWeek(' + w.n + ')">' +
        '<div class="week-num-badge ' + badgeCls + '">' + w.n + '</div>' +
        '<div class="week-info">' +
          '<div class="week-name">' + w.label + '</div>' +
          '<div class="week-sub">' + w.dates + (isCurrent ? ' <span style="color:var(--accent)">← now</span>' : '') + '</div>' +
        '</div>' +
        '<div class="week-right">' +
          '<div class="week-km">' + fmt(totalDist) + ' ' + unitLabel() + '</div>' +
          '<div class="week-check-count">' + dc.done + '/' + dc.total + ' done</div>' +
        '</div>' +
        '<span class="week-chevron' + (isOpen ? ' open' : '') + '">⌄</span>' +
      '</div>' +
      '<div class="week-days' + (isOpen ? ' open' : '') + '" id="wdays-' + w.n + '">' +
        '<div class="days-grid">' + daysHtml + '</div>' +
        '<div class="week-note">' + w.notes + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleWeek(n) {
  if (openWeeks.has(n)) openWeeks.delete(n);
  else openWeeks.add(n);
  renderWeeks();
  if (openWeeks.has(n)) {
    setTimeout(() => {
      const el = document.getElementById('wcard-' + n);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWeeks();
}

function onDayTap(weekN, dayIdx) {
  const w = weeks.find(x => x.n === weekN);
  const d = w.days[dayIdx];
  if (d.type === 'rest') return;
  overlayTarget = { weekN, dayIdx };
  const dd = DAY_DETAILS[d.type];
  const dayName = DAY_NAMES[dayIdx];
  const done = isDone(weekN, dayIdx);

  document.getElementById('ov-title').textContent = dayName + ' — ' + dd.label;
  document.getElementById('ov-sub').textContent = 'Week ' + weekN + ' · ' + w.dates + (d.km ? ' · ' + fmt(d.km) + ' ' + unitLabel() : '');
  document.getElementById('ov-detail').textContent = d.detail;

  // Vibes card
  const vibesEl = document.getElementById('ov-vibes');
  if (d.type === 'vibes') {
    const q = vibeQuote(weekN);
    vibesEl.innerHTML = '<div class="vibes-label">🎵 Vibes Run Day</div>' +
      '<div class="vibes-quote">' +
        '<div class="vibes-quote-text">"' + q.quote + '"</div>' +
        '<div class="vibes-quote-attr">— Bob Marley · ' + q.song + '</div>' +
      '</div>';
  } else {
    vibesEl.innerHTML = '';
  }

  const actions = document.getElementById('ov-actions');
  if (done) {
    actions.innerHTML = '<button class="btn-undone" onclick="markDay(null)">Mark incomplete</button>';
  } else {
    actions.innerHTML = '<button class="btn-done" onclick="markDay(\'done\')">Mark complete ✓</button><button class="btn-skip" onclick="markDay(\'skip\')">Skip</button>';
  }
  document.getElementById('overlay').classList.add('open');
}

function markDay(val) {
  if (!overlayTarget) return;
  setDayState(overlayTarget.weekN, overlayTarget.dayIdx, val);
  closeOverlay();
  renderWeeks();
  updateStats();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  overlayTarget = null;
}

function autoOpenCurrentWeek() {
  openWeeks.add(currentWeekNum());
}

function init() {
  loadState();
  // Apply saved unit to toggle UI
  document.getElementById('btn-km').classList.toggle('active', unit === 'km');
  document.getElementById('btn-mi').classList.toggle('active', unit === 'mi');
  document.getElementById('header-date').textContent = 'Oct 18, 2026 · ' + (unit === 'mi' ? '26.2 mi' : '42.2 km');
  updateCountdown();
  setInterval(updateCountdown, 60000);
  updateStats();
  autoOpenCurrentWeek();
  renderWeeks();
  setTimeout(() => {
    const el = document.getElementById('wcard-' + currentWeekNum());
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

init();
</script>
