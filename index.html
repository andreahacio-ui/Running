<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marathon">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-512.png">
<title>Toronto Marathon 2026</title>
<style>
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #222;
    --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888;
    --accent: #E8FF47; --accent-dim: rgba(232,255,71,0.12);
    --blue: #4A9EFF; --blue-dim: rgba(74,158,255,0.12);
    --orange: #FF7A3D; --orange-dim: rgba(255,122,61,0.12);
    --green: #4ADE80; --green-dim: rgba(74,222,128,0.1);
    --purple: #C084FC; --purple-dim: rgba(192,132,252,0.12);
    --gray-dim: rgba(255,255,255,0.06);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

  /* Header */
  .header { padding: 14px 20px 10px; flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-photo { width: 52px; height: 52px; border-radius: 14px; object-fit: cover; border: 2px solid var(--accent); flex-shrink: 0; }
  .header-text { display: flex; flex-direction: column; }
  .header-title { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  .header-race { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .header-date { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
  .countdown-pill { background: var(--accent); color: #0f0f0f; font-size: 12px; font-weight: 700; padding: 4px 11px; border-radius: 20px; white-space: nowrap; }

  /* Toggles row */
  .toggles-row { display: flex; gap: 8px; padding: 0 20px 10px; flex-shrink: 0; }
  .toggle-group { display: flex; background: var(--bg3); border-radius: 20px; padding: 3px; border: 1px solid var(--border); }
  .toggle-btn { padding: 4px 11px; border-radius: 16px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.18s; letter-spacing: 0.03em; white-space: nowrap; }
  .toggle-btn.active { background: var(--text); color: var(--bg); }
  .toggle-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; align-self: center; margin-right: 2px; }

  /* Progress bar */
  .progress-section { padding: 0 20px 10px; flex-shrink: 0; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 20px 10px; flex-shrink: 0; }
  .stat-card { background: var(--bg2); border-radius: 12px; padding: 9px 12px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .stat-val { font-size: 17px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 10px; color: var(--muted); }

  /* Phase nav */
  .phase-nav { display: flex; gap: 6px; padding: 0 20px 8px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .phase-nav::-webkit-scrollbar { display: none; }
  .phase-btn { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--muted); white-space: nowrap; cursor: pointer; transition: all 0.15s; }
  .phase-btn.active { background: var(--accent); color: #0f0f0f; border-color: transparent; }

  /* Week list */
  .week-list { flex: 1; overflow-y: auto; padding: 0 20px; padding-bottom: calc(20px + var(--safe-bottom)); scrollbar-width: none; }
  .week-list::-webkit-scrollbar { display: none; }
  .week-card { background: var(--bg2); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; border: 1px solid var(--border); }
  .week-card.current-week { border-color: var(--accent); }
  .week-card.completed-week { opacity: 0.6; }
  .week-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .week-num-badge { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .badge-base { background: var(--gray-dim); color: var(--muted); }
  .badge-build { background: var(--blue-dim); color: var(--blue); }
  .badge-peak { background: var(--orange-dim); color: var(--orange); }
  .badge-taper { background: var(--green-dim); color: var(--green); }
  .week-info { flex: 1; min-width: 0; }
  .week-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .week-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .week-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .week-km { font-size: 13px; font-weight: 700; color: var(--text); }
  .week-check-count { font-size: 10px; color: var(--muted); }
  .week-chevron { font-size: 15px; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
  .week-chevron.open { transform: rotate(180deg); }

  /* Days grid */
  .week-days { display: none; padding: 0 12px 12px; }
  .week-days.open { display: block; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day-cell { border-radius: 10px; padding: 7px 3px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
  .day-cell.clickable:active { transform: scale(0.94); }
  .day-name-label { font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 3px; }
  .day-icon { font-size: 17px; margin-bottom: 2px; display: block; }
  .day-type-label { font-size: 8px; font-weight: 600; line-height: 1.2; }
  .day-dist { font-size: 8px; color: var(--muted); margin-top: 1px; }
  .day-rest { background: var(--gray-dim); } .day-rest .day-type-label { color: var(--muted); }
  .day-run { background: var(--blue-dim); } .day-run .day-type-label { color: var(--blue); }
  .day-long { background: var(--orange-dim); } .day-long .day-type-label { color: var(--orange); }
  .day-strength { background: var(--green-dim); } .day-strength .day-type-label { color: var(--green); }
  .day-race { background: rgba(232,255,71,0.1); } .day-race .day-type-label { color: var(--accent); }
  .day-vibes { background: var(--purple-dim); } .day-vibes .day-type-label { color: var(--purple); }
  .day-cell.done::after { content: '✓'; position: absolute; top: 2px; right: 3px; font-size: 8px; font-weight: 800; color: var(--green); }
  .day-cell.done .day-icon { opacity: 0.4; }
  .week-note { margin-top: 8px; font-size: 11px; color: var(--muted); line-height: 1.5; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 10px; }

  /* Overlay */
  .overlay { display: none; position: fixed; inset: 0; z-index: 100; }
  .overlay.open { display: flex; align-items: flex-end; }
  .overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.7); }
  .overlay-sheet { position: relative; z-index: 1; background: var(--bg2); border-radius: 24px 24px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom)); width: 100%; max-height: 85vh; overflow-y: auto; }
  .overlay-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .overlay-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .overlay-sub { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .overlay-detail { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 14px; }
  .overlay-actions { display: flex; gap: 10px; }
  .btn-done { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; background: var(--green); color: #0f0f0f; }
  .btn-undone { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; border: 1px solid var(--border); cursor: pointer; background: transparent; color: var(--muted); }
  .btn-skip { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; background: var(--orange-dim); color: var(--orange); }
  .vibes-quote { background: var(--purple-dim); border: 1px solid rgba(192,132,252,0.2); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  .vibes-quote-text { font-size: 14px; color: var(--purple); line-height: 1.5; font-style: italic; margin-bottom: 5px; }
  .vibes-quote-attr { font-size: 11px; color: var(--muted); }
  .vibes-label { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--purple); font-weight: 600; background: var(--purple-dim); padding: 3px 8px; border-radius: 6px; margin-bottom: 10px; }
  .empty-msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <img class="header-photo" src="photo.png" alt="Marathon crew">
        <div class="header-text">
          <div class="header-title">Training plan</div>
          <div class="header-race">Toronto Waterfront</div>
          <div class="header-date" id="header-date">Oct 18, 2026 · 42.2 km</div>
        </div>
      </div>
      <div class="header-right">
        <div class="countdown-pill" id="countdown">—</div>
      </div>
    </div>
  </div>

  <div class="toggles-row">
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-km" onclick="setUnit('km')">KM</button>
      <button class="toggle-btn" id="btn-mi" onclick="setUnit('mi')">MI</button>
    </div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-2s" onclick="setMode('2s4r')">2S·4R</button>
      <button class="toggle-btn" id="btn-3s" onclick="setMode('3s3r')">3S·3R</button>
    </div>
    <div style="flex:1;align-self:center;text-align:right;font-size:10px;color:var(--muted);padding-right:2px;" id="mode-label">2 strength · 4 runs</div>
  </div>

  <div class="progress-section">
    <div class="progress-meta">
      <span id="prog-label">0 of 0 sessions done</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Week</div>
      <div class="stat-val" id="stat-week">—</div>
      <div class="stat-sub">of 18</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This week</div>
      <div class="stat-val" id="stat-thisweek">—</div>
      <div class="stat-sub" id="stat-thisweek-sub">planned</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Long run</div>
      <div class="stat-val" id="stat-long">—</div>
      <div class="stat-sub" id="stat-long-sub">Saturday</div>
    </div>
  </div>

  <div class="phase-nav">
    <button class="phase-btn active" onclick="setFilter('all',this)">All</button>
    <button class="phase-btn" onclick="setFilter('base',this)">Base</button>
    <button class="phase-btn" onclick="setFilter('build',this)">Build</button>
    <button class="phase-btn" onclick="setFilter('peak',this)">Peak</button>
    <button class="phase-btn" onclick="setFilter('taper',this)">Taper</button>
  </div>

  <div class="week-list" id="weekList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-bg" onclick="closeOverlay()"></div>
  <div class="overlay-sheet">
    <div class="overlay-handle"></div>
    <div class="overlay-title" id="ov-title"></div>
    <div class="overlay-sub" id="ov-sub"></div>
    <div id="ov-vibes"></div>
    <div class="overlay-detail" id="ov-detail"></div>
    <div class="overlay-actions" id="ov-actions"></div>
  </div>
</div>

<script>
const RACE_DATE = new Date('2026-10-18T06:30:00');
const START_DATE = new Date('2026-06-15');
const KM_TO_MI = 0.621371;
let unit = 'km';
let mode = '2s4r'; // '2s4r' or '3s3r'

function fmt(km) { return unit === 'mi' ? (km * KM_TO_MI).toFixed(1) : km; }
function unitLabel() { return unit === 'mi' ? 'mi' : 'km'; }

function setUnit(u) {
  unit = u;
  localStorage.setItem('marathon_unit', u);
  document.getElementById('btn-km').classList.toggle('active', u==='km');
  document.getElementById('btn-mi').classList.toggle('active', u==='mi');
  document.getElementById('header-date').textContent = 'Oct 18, 2026 · ' + (u==='mi' ? '26.2 mi' : '42.2 km');
  updateStats(); renderWeeks();
}

function setMode(m) {
  mode = m;
  localStorage.setItem('marathon_mode', m);
  document.getElementById('btn-2s').classList.toggle('active', m==='2s4r');
  document.getElementById('btn-3s').classList.toggle('active', m==='3s3r');
  document.getElementById('mode-label').textContent = m==='3s3r' ? '3 strength · 3 runs' : '2 strength · 4 runs';
  updateStats(); renderWeeks();
}

const BOB_QUOTES = [
  {quote:"Every little thing is gonna be alright.",song:"Three Little Birds"},
  {quote:"Open your eyes, look within. Are you satisfied with the life you're living?",song:"Exodus"},
  {quote:"You never know how strong you are until being strong is your only choice.",song:"— Bob Marley"},

  {quote:"Emancipate yourselves from mental slavery; none but ourselves can free our minds.",song:"Redemption Song"},
  {quote:"The truth is, everyone is going to hurt you. You just got to find the ones worth suffering for.",song:"— Bob Marley"},
  {quote:"Live for yourself and you will live in vain; live for others, and you will live again.",song:"Pass It On"},
  {quote:"In this bright future you can't forget your past.",song:"No Woman No Cry"},
  {quote:"Get up, stand up, stand up for your rights.",song:"Get Up Stand Up"},
  {quote:"Some people feel the rain. Others just get wet.",song:"— Bob Marley"},
  {quote:"Life is one big road with lots of signs. So when you riding through the ruts, don't complicate your mind.",song:"Wake Up and Live"},
  {quote:"Love the life you live. Live the life you love.",song:"— Bob Marley"},
  {quote:"Every man gotta right to decide his own destiny.",song:"Zimbabwe"},
  {quote:"None but ourselves can free our minds.",song:"Redemption Song"},
  {quote:"Don't worry about a thing, 'cause every little thing gonna be all right.",song:"Three Little Birds"},
  {quote:"The greatness of a man is not in how much wealth he acquires, but in his integrity.",song:"— Bob Marley"},
  {quote:"Judge not, before you judge yourself.",song:"Judge Not"},
  {quote:"Wake up and live!",song:"Wake Up and Live"},
];
function vibeQuote(n) { return BOB_QUOTES[(n-1) % BOB_QUOTES.length]; }

const DAY_ICONS = {rest:'😴',run:'🏃',long:'🏅',strength:'💪',race:'🏁',vibes:'🎵'};
const DAY_DETAILS = {
  rest:     {label:'Rest',      cls:'day-rest'},
  run:      {label:'Easy Run',  cls:'day-run'},
  long:     {label:'Long Run',  cls:'day-long'},
  strength: {label:'Strength',  cls:'day-strength'},
  race:     {label:'Race Day',  cls:'day-race'},
  vibes:    {label:'Vibes Run', cls:'day-vibes'},
};

// Day layout: 6 days (Mon–Sat). Sun removed (only 1 rest day = Mon).
// 2S·4R mode: Mon=rest, Tue=run, Wed=strength, Thu=vibes, Fri=run, Sat=long, Sun=run
// 3S·3R mode: Mon=rest, Tue=run, Wed=strength, Thu=strength, Fri=vibes, Sat=long, Sun=strength
// Only one rest day per week (Monday). Sunday is the optional extra run or strength session.

const DAY_NAMES_6 = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// Base week template builder.
// Each week: 7 entries [Mon..Sun], only Monday is rest.
// 2s4r: Mon rest, Tue run, Wed strength, Thu vibes, Fri run, Sat long, Sun run (4 runs, 2 strength)
// 3s3r: Mon rest, Tue run, Wed strength, Thu strength, Fri vibes, Sat long, Sun strength (3 runs, 3 strength)

function buildDays(w, m) {
  // m = '2s4r' or '3s3r'
  const v = w.vibesKm, r1 = w.run1Km, r2 = w.run2Km;
  const sunRunKm = Math.max(4, Math.round(r1 * 0.6));
  if (m === '2s4r') {
    // Mon rest | Tue run | Wed strength | Thu vibes | Fri run | Sat long | Sun run
    return [
      {type:'rest',     detail:'Full rest — recharge'},
      {type:'run',      km:r1,      detail: r1 + ' km easy pace — conversational'},
      {type:'strength',             detail:w.str1},
      {type:'vibes',    km:v,       detail:w.vibesDetail},
      {type:'run',      km:r2,      detail: r2 + ' km easy — keep it relaxed'},
      {type:'long',     km:w.long,  detail:w.longDetail},
      {type:'run',      km:sunRunKm, detail: sunRunKm + ' km easy — optional recovery run, go by feel'},
    ];
  } else {
    // 3s3r: Mon rest | Tue run | Wed strength | Thu strength | Fri vibes | Sat long | Sun strength
    return [
      {type:'rest',     detail:'Full rest — recharge'},
      {type:'run',      km:r1,      detail: r1 + ' km easy pace — conversational'},
      {type:'strength',             detail:w.str1},
      {type:'strength',             detail:w.str3 || w.str2},
      {type:'vibes',    km:v,       detail:w.vibesDetail},
      {type:'long',     km:w.long,  detail:w.longDetail},
      {type:'strength',             detail: w.str2 + ' — optional third session, go lighter'},
    ];
  }
}

// Week definitions (mode-independent core data)
const weekDefs = [
  {n:1,  phase:'base',  label:'Base conditioning',   dates:'Jun 15–21', long:12, run1Km:6,  run2Km:7,  vibesKm:6,  total2s:32, total3s:30,
   str1:'Full body — squats, deadlifts, core', str2:'Upper body + hip stability', str3:'Legs — lunges, glutes',
   vibesDetail:'6 km easy — no pace goals, just enjoy the movement',

   notes:'Re-establishing your aerobic base. Keep all runs at an easy, conversational pace — you should be able to speak in full sentences.'},
  {n:2,  phase:'base',  label:'Aerobic base',         dates:'Jun 22–28', long:14, run1Km:6,  run2Km:7,  vibesKm:7,  total2s:36, total3s:34,
   str1:'Legs — lunges, step-ups, core', str2:'Upper body + glutes', str3:'Hip flexors + posterior chain',
   vibesDetail:'7 km easy — put on your favourite playlist and just run',
   longDetail:'14 km — easy',
   notes:'Introduce your first gentle tempo feeling mid-week. Strength sessions should leave you tired but not wrecked.'},
  {n:3,  phase:'base',  label:'Building rhythm',      dates:'Jun 29–Jul 5', long:16, run1Km:7, run2Km:8, vibesKm:7, total2s:40, total3s:38,
   str1:'Full body circuit', str2:'Hip & glute focus', str3:'Core + mobility',
   vibesDetail:'7 km — explore a new route, no watch-watching allowed',
   longDetail:'16 km — easy, refuel at 8 km mark',
   notes:'Start practicing mid-run nutrition. Aim for 30–60g carbs/hr after the first hour. Try gels, chews, or dates.'},
  {n:4,  phase:'base',  label:'Recovery week',        dates:'Jul 6–12',  long:13, run1Km:5,  run2Km:6,  vibesKm:6,  total2s:30, total3s:28,
   str1:'Light maintenance — reduce load 30%', str2:'Full rest or gentle yoga', str3:'Bodyweight only',
   vibesDetail:'6 km — recovery vibes, slower than you think you need to go',
   longDetail:'13 km — easy',
   notes:'Planned recovery week — reduce volume by ~25%. This is where adaptation actually happens.'},
  {n:5,  phase:'base',  label:'Strength of base',     dates:'Jul 13–19', long:18, run1Km:8,  run2Km:9,  vibesKm:9,  total2s:44, total3s:42,
   str1:'Posterior chain focus', str2:'Core + stability', str3:'Legs — heavier squats',
   vibesDetail:'9 km — run somewhere beautiful, earn the view',
   longDetail:'18 km — easy, nutrition every 45 min',
   notes:"You're now back to your pre-gap fitness. From here every week adds genuine new capacity."},
  {n:6,  phase:'build', label:'Build begins',         dates:'Jul 20–26', long:20, run1Km:8,  run2Km:9,  vibesKm:8,  total2s:48, total3s:46,
   str1:'Full body — heavier squats, RDLs', str2:'Upper + hip flexors', str3:'Single-leg work + core',
   vibesDetail:'8 km — run with a friend or podcast, no pace goals',
   longDetail:'20 km — first 20! Easy all the way',
   notes:'Your first 20 km long run is a milestone. One quality session per week — keep everything else easy.'},
  {n:7,  phase:'build', label:'Building aerobic engine', dates:'Jul 27–Aug 2', long:22, run1Km:9, run2Km:10, vibesKm:10, total2s:52, total3s:50,
   str1:'Legs + core', str2:'Glutes + upper body', str3:'Hip stability + deadlifts',
   vibesDetail:'10 km — sunset run, no structure, just miles',
   longDetail:'22 km — easy',
   notes:'Heat may be a factor in late July Toronto. Run early mornings or evenings. Slow 15–20 sec/km in humidity.'},
  {n:8,  phase:'build', label:'Recovery week',        dates:'Aug 3–9',   long:17, run1Km:6,  run2Km:8,  vibesKm:8,  total2s:38, total3s:36,
   str1:'Light maintenance', str2:'Bodyweight only', str3:'Core + mobility',
   vibesDetail:'8 km — recovery vibes, feel the body bouncing back',

// Build week 18 days specially
function buildWeek18Days(m) {
  // Mon rest, Tue easy 5km, Wed rest, Thu vibes 4km, Fri rest, Sat RACE
  return [
    {type:'rest',  detail:'Full rest'},
    {type:'run',   km:5, detail:'4–5 km very easy — shake out the legs'},
    {type:'rest',  detail:'Full rest'},
    {type:'vibes', km:4, detail:'4 km easy + 4 strides — final vibes run'},
    {type:'rest',  detail:'Carb load, hydrate, gear check'},
    {type:'race',  km:42, detail:'TCS Toronto Waterfront Marathon 🏁'},
    {type:'rest',  detail:'You just ran a marathon. Rest. Celebrate. 🎉'},
  ];
}

const PHASE_BADGE = {base:'badge-base',build:'badge-build',peak:'badge-peak',taper:'badge-taper'};
let state = {}, currentFilter = 'all', openWeeks = new Set(), overlayTarget = null;

function loadState() {
  try { state = JSON.parse(localStorage.getItem('marathon_state')||'{}'); } catch(e) { state={}; }
  unit = localStorage.getItem('marathon_unit')||'km';
  mode = localStorage.getItem('marathon_mode')||'2s4r';
}
function saveState() { localStorage.setItem('marathon_state', JSON.stringify(state)); }
function stateKey(wn,di) { return 'w'+wn+'_d'+di; }
function isDone(wn,di) { return state[stateKey(wn,di)]==='done'; }
function setDayState(wn,di,val) {
  if (val===null) delete state[stateKey(wn,di)];
  else state[stateKey(wn,di)] = val;
  saveState();
}

function currentWeekNum() {
  const diff = new Date() - START_DATE;
  return Math.max(1, Math.min(18, Math.floor(diff/(7*24*3600*1000))+1));
}

function getDays(w) {
  if (w.n === 18) return buildWeek18Days(mode);
  return buildDays(w, mode);
}

function countStats() {
  let total=0, done=0;
  weekDefs.forEach(w => {
    getDays(w).forEach((d,i) => {
      if (d.type!=='rest') { total++; if(isDone(w.n,i)) done++; }
    });
  });
  return {total, done};
}
function weekDoneCount(w) {
  let total=0, done=0;
  getDays(w).forEach((d,i) => {
    if (d.type!=='rest') { total++; if(isDone(w.n,i)) done++; }
  });
  return {total, done};
}

function updateCountdown() {
  const diff = RACE_DATE - new Date();
  if (diff<=0) { document.getElementById('countdown').textContent='Race day!'; return; }
  document.getElementById('countdown').textContent = Math.ceil(diff/(1000*3600*24))+' days';
}

function updateStats() {
  const {total, done} = countStats();
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('prog-label').textContent = done+' of '+total+' sessions done';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-bar').style.width = pct+'%';
  const cw = currentWeekNum();
  document.getElementById('stat-week').textContent = cw;
  const curWeek = weekDefs.find(w=>w.n===cw);
  if (curWeek) {
    const tot = cw===18 ? 15 : (mode==='3s3r' ? curWeek.total3s : curWeek.total2s);
    document.getElementById('stat-thisweek').textContent = fmt(tot);
    document.getElementById('stat-long').textContent = fmt(cw===18?42:curWeek.long);
    document.getElementById('stat-long-sub').textContent = unitLabel()+' Saturday';
    const dc = weekDoneCount(curWeek);
    document.getElementById('stat-thisweek-sub').textContent = dc.done+'/'+dc.total+' done · '+unitLabel();
  }
}

function renderWeeks() {
  const cw = currentWeekNum();
  const list = document.getElementById('weekList');
  const filtered = currentFilter==='all' ? weekDefs : weekDefs.filter(w => {
    if (currentFilter==='base') return w.phase==='base';
    if (currentFilter==='build') return w.phase==='build';
    return w.phase===currentFilter;
  });
  if (!filtered.length) { list.innerHTML='<div class="empty-msg">No weeks in this phase.</div>'; return; }

  list.innerHTML = filtered.map(w => {
    const days = getDays(w);
    const dc = weekDoneCount(w);
    const isCurrent = w.n===cw;
    const isComplete = dc.done===dc.total && dc.total>0;
    const badgeCls = PHASE_BADGE[w.phase]||'badge-base';
    const isOpen = openWeeks.has(w.n);
    const tot = w.n===18 ? 15 : (mode==='3s3r' ? w.total3s : w.total2s);

    const daysHtml = days.map((d,i) => {
      const dd = DAY_DETAILS[d.type]||DAY_DETAILS.rest;
      const done = isDone(w.n,i);
      const clickable = d.type!=='rest' ? 'clickable' : '';
      const doneClass = done ? 'done' : '';
      const icon = DAY_ICONS[d.type]||'😴';
      const distVal = d.km ? fmt(d.km)+' '+unitLabel() : '';
      const kmLabel = distVal ? '<div class="day-dist">'+distVal+'</div>' : '';
      return '<div class="day-cell '+dd.cls+' '+clickable+' '+doneClass+'" onclick="event.stopPropagation();onDayTap('+w.n+','+i+')">'
        +'<div class="day-name-label">'+DAY_NAMES_6[i]+'</div>'
        +'<span class="day-icon">'+icon+'</span>'
        +'<div class="day-type-label">'+dd.label+'</div>'
        +kmLabel+'</div>';
    }).join('');

    return '<div class="week-card'+(isCurrent?' current-week':'')+(isComplete?' completed-week':'')+'" id="wcard-'+w.n+'">'
      +'<div class="week-header" onclick="toggleWeek('+w.n+')">'
        +'<div class="week-num-badge '+badgeCls+'">'+w.n+'</div>'
        +'<div class="week-info">'
          +'<div class="week-name">'+w.label+'</div>'
          +'<div class="week-sub">'+w.dates+(isCurrent?' <span style="color:var(--accent)">← now</span>':'')+' · '+w.phase+'</div>'
        +'</div>'
        +'<div class="week-right">'
          +'<div class="week-km">'+fmt(tot)+' '+unitLabel()+'</div>'
          +'<div class="week-check-count">'+dc.done+'/'+dc.total+' done</div>'
        +'</div>'
        +'<span class="week-chevron'+(isOpen?' open':'')+'">⌄</span>'
      +'</div>'
      +'<div class="week-days'+(isOpen?' open':'')+'" id="wdays-'+w.n+'">'
        +'<div class="days-grid">'+daysHtml+'</div>'
        +'<div class="week-note">'+w.notes+'</div>'
      +'</div></div>';
  }).join('');
}

function toggleWeek(n) {
  if (openWeeks.has(n)) openWeeks.delete(n); else openWeeks.add(n);
  renderWeeks();
  if (openWeeks.has(n)) setTimeout(()=>{ const el=document.getElementById('wcard-'+n); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },50);
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.phase-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderWeeks();
}

function onDayTap(weekN, dayIdx) {
  const w = weekDefs.find(x=>x.n===weekN);
  const days = getDays(w);
  const d = days[dayIdx];
  if (d.type==='rest') return;

  // Tap a completed session to un-mark it instantly (no overlay)
  if (isDone(weekN, dayIdx)) {
    setDayState(weekN, dayIdx, null);
    renderWeeks(); updateStats();
    return;
  }

  // Open bottom sheet to confirm completion
  overlayTarget = {weekN, dayIdx};
  const dd = DAY_DETAILS[d.type];
  document.getElementById('ov-title').textContent = DAY_NAMES_6[dayIdx] + ' - ' + dd.label;
  document.getElementById('ov-sub').textContent = 'Week ' + weekN + ' - ' + w.dates + (d.km ? ' - ' + fmt(d.km) + ' ' + unitLabel() : '');
  document.getElementById('ov-detail').textContent = d.detail;
  const vibesEl = document.getElementById('ov-vibes');
  if (d.type === 'vibes') {
    const q = vibeQuote(weekN);
    vibesEl.innerHTML = '<div class="vibes-label">Vibes Run Day</div>'
      + '<div class="vibes-quote"><div class="vibes-quote-text">' + q.quote + '</div>'
      + '<div class="vibes-quote-attr">Bob Marley - ' + q.song + '</div></div>';
  } else {
    vibesEl.innerHTML = '';
  }
  document.getElementById('ov-actions').innerHTML =
    '<button class="btn-done" onclick="markDay('done')">Done &#10003;</button>'
    + '<button class="btn-skip" onclick="markDay('skip')">Skip</button>';
  document.getElementById('overlay').classList.add('open');
}

function markDay(val) {
  if (!overlayTarget) return;
  setDayState(overlayTarget.weekN, overlayTarget.dayIdx, val);
  closeOverlay();
  renderWeeks();
  updateStats();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  overlayTarget = null;
}

function init() {
  loadState();
  document.getElementById('btn-km').classList.toggle('active', unit==='km');
  document.getElementById('btn-mi').classList.toggle('active', unit==='mi');
  document.getElementById('btn-2s').classList.toggle('active', mode==='2s4r');
  document.getElementById('btn-3s').classList.toggle('active', mode==='3s3r');
  document.getElementById('header-date').textContent = 'Oct 18, 2026 · '+(unit==='mi'?'26.2 mi':'42.2 km');
  document.getElementById('mode-label').textContent = mode==='3s3r' ? '3 strength · 3 runs' : '2 strength · 4 runs';
  updateCountdown();
  setInterval(updateCountdown, 60000);
  updateStats();
  openWeeks.add(currentWeekNum());
  renderWeeks();
  setTimeout(()=>{ const el=document.getElementById('wcard-'+currentWeekNum()); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },100);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

init();
</script>
