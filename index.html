<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marathon">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-512.png">
<title>Toronto Marathon 2026</title>
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#888;--accent:#E8FF47;--accent-dim:rgba(232,255,71,0.12);--blue:#4A9EFF;--blue-dim:rgba(74,158,255,0.12);--orange:#FF7A3D;--orange-dim:rgba(255,122,61,0.12);--green:#4ADE80;--green-dim:rgba(74,222,128,0.1);--purple:#C084FC;--purple-dim:rgba(192,132,252,0.12);--gray-dim:rgba(255,255,255,0.06);--radius:14px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.header{padding:14px 20px 10px;flex-shrink:0}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-left{display:flex;align-items:center;gap:12px}
.header-photo{width:52px;height:52px;border-radius:14px;object-fit:cover;border:2px solid var(--accent);flex-shrink:0}
.header-text{display:flex;flex-direction:column}
.header-title{font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.header-race{font-size:20px;font-weight:700;color:var(--text);line-height:1.1}
.header-date{font-size:12px;color:var(--muted);margin-top:1px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.countdown-pill{background:var(--accent);color:#0f0f0f;font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap}
.toggles-row{display:flex;gap:8px;padding:0 20px 10px;flex-shrink:0;align-items:center}
.toggle-group{display:flex;background:var(--bg3);border-radius:20px;padding:3px;border:1px solid var(--border)}
.toggle-btn{padding:4px 11px;border-radius:16px;font-size:11px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .18s;white-space:nowrap;touch-action:manipulation}
.toggle-btn.active{background:var(--text);color:var(--bg)}
.mode-label{font-size:10px;color:var(--muted);flex:1;text-align:right}
.progress-section{padding:0 20px 10px;flex-shrink:0}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px 10px;flex-shrink:0}
.stat-card{background:var(--bg2);border-radius:12px;padding:9px 12px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.stat-val{font-size:17px;font-weight:700;color:var(--text)}
.stat-sub{font-size:10px;color:var(--muted)}
.phase-nav{display:flex;gap:6px;padding:0 20px 8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.phase-nav::-webkit-scrollbar{display:none}
.phase-btn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;cursor:pointer;transition:all .15s;touch-action:manipulation}
.phase-btn.active{background:var(--accent);color:#0f0f0f;border-color:transparent}
.week-list{flex:1;overflow-y:auto;padding:0 20px;padding-bottom:calc(20px + var(--safe-bottom));scrollbar-width:none}
.week-list::-webkit-scrollbar{display:none}
.week-card{background:var(--bg2);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;border:1px solid var(--border)}
.week-card.current-week{border-color:var(--accent)}
.week-card.completed-week{opacity:.6}
.week-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;touch-action:manipulation}
.week-num-badge{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.badge-base{background:var(--gray-dim);color:var(--muted)}
.badge-build{background:var(--blue-dim);color:var(--blue)}
.badge-peak{background:var(--orange-dim);color:var(--orange)}
.badge-taper{background:var(--green-dim);color:var(--green)}
.week-info{flex:1;min-width:0}
.week-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-sub{font-size:11px;color:var(--muted);margin-top:1px}
.week-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.week-km{font-size:13px;font-weight:700;color:var(--text)}
.week-check-count{font-size:10px;color:var(--muted)}
.week-chevron{font-size:15px;color:var(--muted);flex-shrink:0;transition:transform .2s}
.week-chevron.open{transform:rotate(180deg)}
.week-days{display:none;padding:0 12px 12px}
.week-days.open{display:block}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-cell{border-radius:10px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s;position:relative;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.day-cell.clickable:active{transform:scale(.94)}
.day-name-label{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
.day-icon{font-size:17px;margin-bottom:2px;display:block}
.day-type-label{font-size:8px;font-weight:600;line-height:1.2}
.day-dist{font-size:8px;color:var(--muted);margin-top:1px}
.day-rest{background:var(--gray-dim)}.day-rest .day-type-label{color:var(--muted)}
.day-run{background:var(--blue-dim)}.day-run .day-type-label{color:var(--blue)}
.day-long{background:var(--orange-dim)}.day-long .day-type-label{color:var(--orange)}
.day-strength{background:var(--green-dim)}.day-strength .day-type-label{color:var(--green)}
.day-race{background:rgba(232,255,71,0.1)}.day-race .day-type-label{color:var(--accent)}
.day-vibes{background:var(--purple-dim)}.day-vibes .day-type-label{color:var(--purple)}
.day-cell.done::after{content:'✓';position:absolute;top:2px;right:3px;font-size:9px;font-weight:800;color:var(--green)}
.day-cell.done .day-icon{opacity:.4}
.week-note{margin-top:8px;font-size:11px;color:var(--muted);line-height:1.5;background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px}
.overlay{display:none;position:fixed;inset:0;z-index:100}
.overlay.open{display:flex;align-items:flex-end}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,0.7)}
.overlay-sheet{position:relative;z-index:1;background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-height:85vh;overflow-y:auto}
.overlay-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.overlay-title{font-size:18px;font-weight:700;margin-bottom:4px}
.overlay-sub{font-size:13px;color:var(--muted);margin-bottom:12px}
.overlay-detail{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:14px}
.overlay-actions{display:flex;gap:10px}
.btn-done{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;background:var(--green);color:#0f0f0f;touch-action:manipulation}
.btn-skip{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;background:var(--orange-dim);color:var(--orange);touch-action:manipulation}
.btn-undo{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);touch-action:manipulation}
.vibes-card{background:var(--purple-dim);border:1px solid rgba(192,132,252,0.2);border-radius:12px;padding:12px;margin-bottom:12px}
.vibes-card-label{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:6px}
.vibes-card-quote{font-size:14px;color:var(--purple);line-height:1.5;font-style:italic;margin-bottom:4px}
.vibes-card-attr{font-size:11px;color:var(--muted)}
.empty-msg{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <img class="header-photo" src="photo.png" alt="Marathon crew">

        </div>

        <div class="countdown-pill" id="countdown">Loading...</div>
      </div>
    </div>
  </div>

  <div class="toggles-row">
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-km" onclick="setUnit('km')">KM</button>
      <button class="toggle-btn" id="btn-mi" onclick="setUnit('mi')">MI</button>
    </div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-2s" onclick="setMode('2s4r')">2S&middot;4R</button>
      <button class="toggle-btn" id="btn-3s" onclick="setMode('3s3r')">3S&middot;3R</button>
    </div>
    <div class="mode-label" id="mode-label">2 strength &middot; 4 runs</div>
  </div>

  <div class="progress-section">
    <div class="progress-meta">
      <span id="prog-label">0 of 0 sessions done</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Week</div>
      <div class="stat-val" id="stat-week">1</div>
      <div class="stat-sub">of 18</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This week</div>
      <div class="stat-val" id="stat-thisweek">-</div>
      <div class="stat-sub" id="stat-thisweek-sub">planned</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Long run</div>
      <div class="stat-val" id="stat-long">-</div>
      <div class="stat-sub" id="stat-long-sub">Saturday</div>
    </div>
  </div>

  <div class="phase-nav">
    <button class="phase-btn active" onclick="setFilter('all',this)">All</button>
    <button class="phase-btn" onclick="setFilter('base',this)">Base</button>
    <button class="phase-btn" onclick="setFilter('build',this)">Build</button>
    <button class="phase-btn" onclick="setFilter('peak',this)">Peak</button>
    <button class="phase-btn" onclick="setFilter('taper',this)">Taper</button>
  </div>

  <div class="week-list" id="weekList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-bg" id="overlay-bg"></div>
  <div class="overlay-sheet">
    <div class="overlay-handle"></div>
    <div class="overlay-title" id="ov-title"></div>
    <div class="overlay-sub" id="ov-sub"></div>
    <div id="ov-vibes"></div>
    <div class="overlay-detail" id="ov-detail"></div>
    <div class="overlay-actions" id="ov-actions"></div>
  </div>
</div>

      {t:'run',  km:5,   detail:'4-5 km very easy - shake out the legs'},
      {t:'rest', detail:'Full rest'},
      {t:'vibes',km:4,   detail:w.vd},
      {t:'rest', detail:'Carb load, hydrate, gear check'},
      {t:'race', km:42,  detail:w.ld},
      {t:'rest', detail:'You just ran a marathon. Rest and celebrate!'}
    ];
  }
  var sunKm = Math.max(4, Math.round(w.r1 * 0.6));
  if (mode === '2s4r') {
    return [
      {t:'rest',     detail:'Full rest - recharge'},
      {t:'run',      km:w.r1, detail:w.r1 + ' km easy pace - conversational'},
      {t:'strength', detail:w.s1},
      {t:'vibes',    km:w.vkm, detail:w.vd},
      {t:'run',      km:w.r2, detail:w.r2 + ' km easy - keep it relaxed'},
      {t:'long',     km:w.long, detail:w.ld},
      {t:'run',      km:sunKm, detail:sunKm + ' km easy - optional recovery run, go by feel'}
    ];
  } else {
    return [
      {t:'rest',     detail:'Full rest - recharge'},
      {t:'run',      km:w.r1, detail:w.r1 + ' km easy pace - conversational'},
      {t:'strength', detail:w.s1},
      {t:'strength', detail:w.s3 || w.s2},
      {t:'vibes',    km:w.vkm, detail:w.vd},
      {t:'long',     km:w.long, detail:w.ld},
      {t:'strength', detail:w.s2 + ' - optional third session, go lighter'}
    ];
  }
}

function sk(wn, di) { return 'w' + wn + '_d' + di; }
function isDone(wn, di) { return state[sk(wn,di)] === 'done'; }
function isSkip(wn, di) { return state[sk(wn,di)] === 'skip'; }
function setDay(wn, di, val) {
  if (val === null) delete state[sk(wn,di)];
  else state[sk(wn,di)] = val;
  try { localStorage.setItem('mstate', JSON.stringify(state)); } catch(e){}
}

function loadState() {
  try {
    var s = localStorage.getItem('mstate');
    if (s) state = JSON.parse(s);
    var u = localStorage.getItem('munit'); if (u) unit = u;
    var m = localStorage.getItem('mmode'); if (m) mode = m;
  } catch(e) {}
}

function currentWeek() {
  var diff = new Date() - START_DATE;
  var w = Math.floor(diff / (7*24*3600*1000)) + 1;
  return Math.max(1, Math.min(18, w));
}

function weekStats(w) {
  var days = getDays(w);
  var total = 0, done = 0;
  for (var i = 0; i < days.length; i++) {
    if (days[i].t !== 'rest') {
      total++;
      if (isDone(w.n, i)) done++;
    }
  }
  return {total:total, done:done};
}

function updateCountdown() {
  var diff = RACE_DATE - new Date();
  var el = document.getElementById('countdown');
  if (!el) return;
  if (diff <= 0) { el.textContent = 'Race day!'; return; }
  el.textContent = Math.ceil(diff / (1000*3600*24)) + ' days';
}

function updateStats() {
  var total = 0, done = 0;
  for (var i = 0; i < WEEKS.length; i++) {
    var ws = weekStats(WEEKS[i]);
    total += ws.total; done += ws.done;
  }
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-label').textContent = done + ' of ' + total + ' sessions done';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  var cw = currentWeek();
  document.getElementById('stat-week').textContent = cw;
  var cur = WEEKS[cw-1];
  if (cur) {
    var tot = cw===18 ? 15 : (mode==='3s3r' ? cur.t3 : cur.t2);
    document.getElementById('stat-thisweek').textContent = fmt(tot);
    document.getElementById('stat-long').textContent = fmt(cw===18?42:cur.long);
    document.getElementById('stat-long-sub').textContent = ul() + ' Saturday';
    var ws = weekStats(cur);
    document.getElementById('stat-thisweek-sub').textContent = ws.done + '/' + ws.total + ' done - ' + ul();
  }
}

function setUnit(u) {
  unit = u;
  try { localStorage.setItem('munit', u); } catch(e) {}
  document.getElementById('btn-km').className = 'toggle-btn' + (u==='km'?' active':'');
  document.getElementById('btn-mi').className = 'toggle-btn' + (u==='mi'?' active':'');
  document.getElementById('header-date').textContent = 'Oct 18, 2026 - ' + (u==='mi'?'26.2 mi':'42.2 km');
  updateStats();
  renderWeeks();
}

function setMode(m) {
  mode = m;
  try { localStorage.setItem('mmode', m); } catch(e) {}
  document.getElementById('btn-2s').className = 'toggle-btn' + (m==='2s4r'?' active':'');
  document.getElementById('btn-3s').className = 'toggle-btn' + (m==='3s3r'?' active':'');
  document.getElementById('mode-label').textContent = m==='3s3r' ? '3 strength - 3 runs' : '2 strength - 4 runs';
  updateStats();
  renderWeeks();
}

function setFilter(f, btn) {
  currentFilter = f;
  var btns = document.querySelectorAll('.phase-btn');
  for (var i=0;i<btns.length;i++) btns[i].className='phase-btn';
  btn.className = 'phase-btn active';
  renderWeeks();
}

function toggleWeek(n) {
  openWeeks[n] = !openWeeks[n];
  renderWeeks();
  if (openWeeks[n]) {
    setTimeout(function() {
      var el = document.getElementById('wc'+n);
      if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
    }, 50);
  }
}

function tapDay(wn, di) {
  var w = WEEKS[wn-1];
  var days = getDays(w);
  var d = days[di];
  if (d.t === 'rest') return;
  overlayTarget = {wn:wn, di:di};
  var dt = DTYPES[d.t] || DTYPES.rest;
  document.getElementById('ov-title').textContent = DNAMES[di] + ' - ' + dt.label;
  document.getElementById('ov-sub').textContent = 'Week ' + wn + ' - ' + w.dates + (d.km ? ' - ' + fmt(d.km) + ' ' + ul() : '');
  document.getElementById('ov-detail').textContent = d.detail;
  var vibesEl = document.getElementById('ov-vibes');
  if (d.t === 'vibes') {
    var q = BOB[(wn-1) % BOB.length];
    vibesEl.innerHTML = '<div class="vibes-card"><div class="vibes-card-label">Vibes Run Day</div><div class="vibes-card-quote">' + q.q + '</div><div class="vibes-card-attr">Bob Marley - ' + q.s + '</div></div>';
  } else {
    vibesEl.innerHTML = '';
  }
  var actions = document.getElementById('ov-actions');
  if (isDone(wn, di)) {
    actions.innerHTML = '<button class="btn-undo" id="btn-undo">Remove checkmark</button>';
    document.getElementById('btn-undo').onclick = function() { markDay(null); };
  } else {
    actions.innerHTML = '<button class="btn-done" id="btn-done-ov">Done</button><button class="btn-skip" id="btn-skip-ov">Skip</button>';
    document.getElementById('btn-done-ov').onclick = function() { markDay('done'); };
    document.getElementById('btn-skip-ov').onclick = function() { markDay('skip'); };
  }
  document.getElementById('overlay').className = 'overlay open';
}

function markDay(val) {
  if (!overlayTarget) return;
  setDay(overlayTarget.wn, overlayTarget.di, val);
  closeOverlay();
  renderWeeks();
  updateStats();
}

function closeOverlay() {
  document.getElementById('overlay').className = 'overlay';
  overlayTarget = null;
}

function renderWeeks() {
  var cw = currentWeek();
  var list = document.getElementById('weekList');
  var weeks = currentFilter==='all' ? WEEKS : WEEKS.filter(function(w) {
    if (currentFilter==='base') return w.phase==='base';
    if (currentFilter==='build') return w.phase==='build';
    return w.phase===currentFilter;
  });
  if (!weeks.length) { list.innerHTML='<div class="empty-msg">No weeks in this phase.</div>'; return; }
  var html = '';
  for (var i=0;i<weeks.length;i++) {
    var w = weeks[i];
    var days = getDays(w);
    var ws = weekStats(w);
    var isCur = w.n===cw;
    var isDoneAll = ws.done===ws.total && ws.total>0;
    var badge = 'badge-'+w.phase;
    var isOpen = !!openWeeks[w.n];
    var tot = w.n===18 ? 15 : (mode==='3s3r' ? w.t3 : w.t2);
    var daysHtml = '';
    for (var j=0;j<days.length;j++) {
      var d = days[j];
      var dt = DTYPES[d.t] || DTYPES.rest;
      var done = isDone(w.n, j);
      var skip = isSkip(w.n, j);
      var cls = dt.cls + (d.t!=='rest'?' clickable':'') + (done?' done':'') + (skip?' skipped':'');
      var distHtml = d.km ? '<div class="day-dist">'+fmt(d.km)+' '+ul()+'</div>' : '';
      var doneAfter = done ? '<span style="position:absolute;top:2px;right:3px;font-size:9px;font-weight:800;color:var(--green)">&#10003;</span>' : '';
      var skipStyle = skip ? 'opacity:0.4;' : '';
      daysHtml += '<div class="day-cell '+cls+'" style="'+skipStyle+'" onclick="tapDay('+w.n+','+j+')">'
        + doneAfter
        + '<div class="day-name-label">'+DNAMES[j]+'</div>'
        + '<span class="day-icon" style="'+(done?'opacity:.4':'')+'">'+dt.icon+'</span>'
        + '<div class="day-type-label">'+dt.label+'</div>'
        + distHtml
        + '</div>';
    }
    html += '<div class="week-card'+(isCur?' current-week':'')+(isDoneAll?' completed-week':'')+'" id="wc'+w.n+'">'
      + '<div class="week-header" onclick="toggleWeek('+w.n+')">'
        + '<div class="week-num-badge '+badge+'">'+w.n+'</div>'
        + '<div class="week-info">'
          + '<div class="week-name">'+w.label+'</div>'
          + '<div class="week-sub">'+w.dates+(isCur?' &larr; now':'')+' &middot; '+w.phase+'</div>'
        + '</div>'
        + '<div class="week-right">'
          + '<div class="week-km">'+fmt(tot)+' '+ul()+'</div>'
          + '<div class="week-check-count">'+ws.done+'/'+ws.total+' done</div>'
        + '</div>'
        + '<span class="week-chevron'+(isOpen?' open':'')+'">&#8964;</span>'
      + '</div>'
      + '<div class="week-days'+(isOpen?' open':'')+'">'
        + '<div class="days-grid">'+daysHtml+'</div>'
        + '<div class="week-note">'+w.note+'</div>'
      + '</div>'
      + '</div>';
  }
  list.innerHTML = html;
}

document.getElementById('overlay-bg').onclick = closeOverlay;

loadState();
document.getElementById('btn-km').className = 'toggle-btn' + (unit==='km'?' active':'');
document.getElementById('btn-mi').className = 'toggle-btn' + (unit==='mi'?' active':'');
document.getElementById('btn-2s').className = 'toggle-btn' + (mode==='2s4r'?' active':'');
document.getElementById('btn-3s').className = 'toggle-btn' + (mode==='3s3r'?' active':'');
document.getElementById('header-date').textContent = 'Oct 18, 2026 - ' + (unit==='mi'?'26.2 mi':'42.2 km');
document.getElementById('mode-label').textContent = mode==='3s3r' ? '3 strength - 3 runs' : '2 strength - 4 runs';
openWeeks[currentWeek()] = true;
updateCountdown();
setInterval(updateCountdown, 60000);
updateStats();
renderWeeks();
setTimeout(function() {
  var el = document.getElementById('wc'+currentWeek());
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}, 150);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
